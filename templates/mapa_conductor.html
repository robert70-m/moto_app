{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<div class="card" style="height: 85vh; display: flex; flex-direction: column; padding: 5px; margin-bottom: 10px;">
    <h3 style="text-align: center; margin: 10px 0; font-size: 1.4rem;">Viajes en tiempo real 🏍️</h3>
    <div id="map" style="flex-grow: 1; border-radius: 10px; z-index: 1;"></div>
</div>

<style>
    .leaflet-routing-container { display: none !important; }
    .leaflet-control-zoom-in, .leaflet-control-zoom-out {
        width: 44px !important;
        height: 44px !important;
        line-height: 44px !important;
        font-size: 20px !important;
    }
    .leaflet-popup-content {
        font-size: 1.1rem !important;
        min-width: 150px !important;
        text-align: center;
    }
    .btn-aceptar-mapa {
        background: #27ae60;
        color: white;
        padding: 12px;
        border-radius: 8px;
        display: block;
        text-align: center;
        margin-top: 10px;
        text-decoration: none;
        font-weight: bold;
        font-size: 1rem;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .leaflet-marker-icon {
        border: none !important;
        background: transparent !important;
        filter: none !important;
    }
</style>

<script>
let map;
let rutasActivas = [];
let viajeEnCurso = false;
let idViajeActivo = null;

// Iconos
const iconVerde = L.icon({
    iconUrl: "{{ url_for('static', filename='img/marker-icon-2x-green.png') }}",
    iconSize: [30, 50],
    iconAnchor: [15, 50],
    popupAnchor: [1, -34]
});

const iconRojo = L.icon({
    iconUrl: "{{ url_for('static', filename='img/marker-icon-2x-red.png') }}",
    iconSize: [30, 50],
    iconAnchor: [15, 50],
    popupAnchor: [1, -34]
});

function initMap() {
    map = L.map('map').setView([16.75, -96.67], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 14);
        });
    }

    setTimeout(() => map.invalidateSize(), 600);
}

// 🔥 POPUP CENTRALIZADO (IMPORTANTE)
function getPopup(i, v) {
    if (i === 0) {
        if (v.id === idViajeActivo && v.estado === 'aceptado') {
            return `<b>Viaje en Curso 🏍️</b><br>
                    <a href="/finalizar_viaje/${v.id}" class="btn-aceptar-mapa" style="background:#e74c3c;">
                    FINALIZAR VIAJE 🏁</a>`;
        } else {
            return `<b>Punto de Recogida</b><br>
                    <button onclick="aceptarViaje(${v.id})" class="btn-aceptar-mapa">
                    ACEPTAR VIAJE ✅</button>`;
        }
    }
    return `<b>Destino Final</b>`;
}

function cargarViajes() {
    fetch("/api_viajes")
    .then(res => res.json())
    .then(data => {

        // limpiar rutas anteriores
        rutasActivas.forEach(r => map.removeControl(r));
        rutasActivas = [];

        data.viajes.forEach(v => {

            if (v.lat && v.lng && v.lat_destino && v.lng_destino) {

                if (viajeEnCurso && v.id !== idViajeActivo) return;

                if (v.estado === 'pendiente' ||
                   (v.estado === 'aceptado' && v.id === idViajeActivo)) {

                    let ruta = L.Routing.control({
                        waypoints: [
                            L.latLng(v.lat, v.lng),
                            L.latLng(v.lat_destino, v.lng_destino)
                        ],

                        // 🔥 AQUÍ ESTÁ LA CORRECCIÓN IMPORTANTE
                        createMarker: function(i, wp, nWps) {

                            let icono = (i === 0) ? iconVerde : iconRojo;

                            return L.marker(wp.latLng, {
                                icon: icono,
                                riseOnHover: true
                            }).bindPopup(getPopup(i, v));
                        },

                        routeWhileDragging: false,
                        addWaypoints: false,
                        draggableWaypoints: false,
                        fitSelectedRoutes: false,
                        show: false
                    });

                    ruta.addTo(map);
                    rutasActivas.push(ruta);
                }
            }
        });
    });
}

function aceptarViaje(id) {
    fetch(`/aceptar_viaje_ajax/${id}`, { method: "POST" })
    .then(r => r.json())
    .then(data => {
        if (data.ok) {
            viajeEnCurso = true;
            idViajeActivo = id;
            cargarViajes();
        } else {
            alert(data.error || "No se pudo aceptar");
        }
    });
}

document.addEventListener("DOMContentLoaded", function() {
    initMap();
    cargarViajes();
    setInterval(cargarViajes, 15000);
});
</script>

{% endblock %}
