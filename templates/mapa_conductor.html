{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<div class="card" style="height: 85vh; display: flex; flex-direction: column; padding: 5px; margin-bottom: 10px;">
    <h3 style="text-align: center; margin: 10px 0; font-size: 1.4rem;">Viajes en tiempo real 🏍️</h3>
    <div id="map" style="flex-grow: 1; border-radius: 10px; z-index: 1;"></div>
</div>

<style>
    /* Ocultar el panel de instrucciones de ruta */
    .leaflet-routing-container { display: none !important; }

    /* MEJORA MÓVIL: Agrandar botones de zoom de Leaflet */
    .leaflet-control-zoom-in, 
    .leaflet-control-zoom-out {
        width: 44px !important;
        height: 44px !important;
        line-height: 44px !important;
        font-size: 20px !important;
    }

    /* MEJORA MÓVIL: Agrandar el contenido de los popups para que sea legible */
    .leaflet-popup-content {
        font-size: 1.1rem !important;
        min-width: 150px !important;
        text-align: center;
    }

    /* Estilo para el botón de aceptar dentro del mapa */
    .btn-aceptar-mapa {
        background: #27ae60; 
        color: white; 
        padding: 12px; 
        border-radius: 8px; 
        display: block; 
        text-align: center; 
        margin-top: 10px; 
        text-decoration: none; 
        font-weight: bold;
        font-size: 1rem;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
</style>

<script>
let map;
let rutasActivas = [];
let viajeEnCurso = false;
let idViajeActivo = null;

// 🟢 CONFIGURACIÓN DE ICONOS
const iconVerde = L.icon({
    iconUrl: "{{ url_for('static', filename='img/marker-icon-2x-green.png') }}",
    shadowUrl: "{{ url_for('static', filename='img/marker-shadow.png') }}",
    iconSize: [30, 50],
    iconAnchor: [15, 50], 
    popupAnchor: [1, -34], 
    shadowSize: [41, 41]
});

const iconRojo = L.icon({
    iconUrl: "{{ url_for('static', filename='img/marker-icon-2x-red.png') }}",
    shadowUrl: "{{ url_for('static', filename='img/marker-shadow.png') }}",
    iconSize: [30, 50],
    iconAnchor: [15, 50], 
    popupAnchor: [1, -34], 
    shadowSize: [41, 41]
});

function initMap() {
    map = L.map('map').setView([16.75, -96.67], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 14);
        });
    }
    setTimeout(() => map.invalidateSize(), 600);
}

function cargarViajes() {
    fetch("/api_viajes")
    .then(res => res.json())
    .then(data => {
        rutasActivas.forEach(r => map.removeControl(r));
        rutasActivas = [];

        data.viajes.forEach(v => {
            if (v.lat && v.lng && v.lat_destino && v.lng_destino) {
                if (viajeEnCurso && v.id !== idViajeActivo) return;

                if (v.estado === 'pendiente' || (v.estado === 'aceptado' && v.id === idViajeActivo)) {
                    
                    let ruta = L.Routing.control({
                        waypoints: [
                            L.latLng(v.lat, v.lng),
                            L.latLng(v.lat_destino, v.lng_destino)
                        ],
                        // FORZAMOS EL USO DE LOS ICONOS AQUÍ
                        createMarker: function(i, wp, nWps) {
                            const markerIcon = (i === 0) ? iconVerde : iconRojo;
                            
                            let popupText = "";
                            if (i === 0) {
                                if (v.id === idViajeActivo) {
                                    popupText = `<b>Viaje en Curso 🏍️</b><br>
                                                 <a href="/finalizar_viaje/${v.id}" class="btn-aceptar-mapa" style="background:#e74c3c; text-decoration:none;">
                                                     FINALIZAR VIAJE 🏁
                                                 </a>`;
                                } else {
                                    popupText = `<b>Punto de Recogida</b><br>
                                                 <button onclick="aceptarViaje(${v.id})" class="btn-aceptar-mapa" style="border:none; width:100%; cursor:pointer;">
                                                     ACEPTAR VIAJE ✅
                                                 </button>`;
                                }
                            } else {
                                popupText = `<b>Destino Final</b>`;
                            }
                            
                            return L.marker(wp.latLng, { icon: markerIcon }).bindPopup(popupText);
                        },
                        addWaypoints: false,
                        draggableWaypoints: false,
                        show: false,
                        lineOptions: {
                            styles: [{ color: '#3498db', opacity: 0.8, weight: 6 }]
                        }
                    }).addTo(map);

                    rutasActivas.push(ruta);
                }
            }
        });
    });
}

function aceptarViaje(id) {
    fetch(`/aceptar_viaje_ajax/${id}`, { method: "POST" })
    .then(r => r.json())
    .then(data => {
        if (data.ok) {
            viajeEnCurso = true;
            idViajeActivo = id;
            cargarViajes();
        } else {
            alert(data.error || "No se pudo aceptar");
        }
    })
    .catch(err => console.error(err));
}

document.addEventListener("DOMContentLoaded", function() {
    initMap();
    cargarViajes();
    setInterval(cargarViajes, 15000);
});
</script>
