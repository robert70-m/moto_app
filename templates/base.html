<body>

<div class="header">
    <span>Moto App 🏍️</span>

    {% if session.get('user_id') %}
    <div class="user-menu">
        <button onclick="toggleMenu()" class="user-btn">
            👤 {{ session.get('nombre', 'Usuario') }}
        </button>

        <div id="dropdown" class="dropdown">
            <a href="/logout">🔒 Cerrar sesión</a>
        </div>
    </div>
    {% endif %}
</div>

<div class="container">
    {% block content %}{% endblock %}
    
    {% if not session.get('user_id') %}
        <div style="text-align: center; margin-top: 20px; background: white; padding: 10px; border-radius: 10px;">
            <p>¿Quieres ganar dinero? <br>
            <a href="/registro_conductor" style="color: #27ae60; font-weight: bold; text-decoration: none;">
                Crea cuenta de conductor
            </a></p>
        </div>
    {% endif %}
</div>
