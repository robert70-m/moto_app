<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto App 🏍️</title>

    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00c6ff);
            color: #1a1a1a;
            margin: 0;
            min-height: 100vh;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 2000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header span {
            flex-grow: 1;
            text-align: center;
        }

        .btn-logout {
            color: white;
            text-decoration: none;
            font-size: 14px;
            background: #e74c3c;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
        }

        .container {
            padding: 15px;
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h2, h3 { margin-top: 0; color: #2c3e50; }
        p, b, span { font-size: 16px; } 

        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    .user-menu {
    position: relative;
}

.user-btn {
    background: #34495e;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

.dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 35px;
    background: white;
    min-width: 150px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    border-radius: 8px;
    overflow: hidden;
    z-index: 999;
}

.dropdown a {
    display: block;
    padding: 10px;
    color: #333;
    text-decoration: none;
}

.dropdown a:hover {
    background: #f1f1f1;
}
    </style>

</head>

<body>

   <div class="header">
    <span>Moto App 🏍️</span>

    {% if session.get('user_id') %}
    <div class="user-menu">
        <button onclick="toggleMenu()" class="user-btn">
            👤 {{ session.get('user_nombre', 'Usuario') }}
        </button>

        <div id="dropdown" class="dropdown">
            <a href="/logout">🔒 Cerrar sesión</a>
        </div>
    </div>
    {% endif %}
</div>
<body>

<div class="header">
    <span>Moto App 🏍️</span>

    {% if session.get('user_id') %}
    <div class="user-menu">
        <button onclick="toggleMenu()" class="user-btn">
            👤 {{ session.get('user_nombre', 'Usuario') }}
        </button>

        <div id="dropdown" class="dropdown">
            <a href="/logout">🔒 Cerrar sesión</a>
        </div>
    </div>
    {% endif %}
</div>

<!-- 🔴 PONLO AQUÍ -->
<p style="color:red;">DEBUG: {{ session }}</p>

<div class="container">
    <div class="container">
        {% block content %}{% endblock %}
        
        {% if not session.get('user_id') %}
            <div style="text-align: center; margin-top: 20px; background: white; padding: 10px; border-radius: 10px;">
                <p>¿Quieres ganar dinero? <br>
                <a href="/registro_conductor" style="color: #27ae60; font-weight: bold; text-decoration: none;">
                    Crea cuenta de conductor
                </a></p>
            </div>
        {% endif %}
    </div>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js')
    }
    </script>
<script>
function toggleMenu() {
    const menu = document.getElementById("dropdown");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// cerrar si das clic afuera
window.onclick = function(e) {
    if (!e.target.matches('.user-btn')) {
        let dropdown = document.getElementById("dropdown");
        if (dropdown) dropdown.style.display = "none";
    }
}
</script>
</body>
</html>
